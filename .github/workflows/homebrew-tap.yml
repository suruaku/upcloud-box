name: Update Homebrew Tap

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  update_tap:
    uses: ./.github/workflows/update-homebrew-tap.yml
    with:
      tag: ${{ inputs.tag }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
