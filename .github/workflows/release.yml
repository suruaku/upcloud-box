name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_NAME=upcloud-app-platform
          if [ "$GOOS" = "windows" ]; then BIN_NAME=upcloud-app-platform.exe; fi
          go build -trimpath -ldflags "-s -w -X github.com/suruaku/upcloud-app-platform/cmd.appVersion=${GITHUB_REF_NAME}" -o "dist/${BIN_NAME}" .

      - name: Package artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OS="${{ matrix.goos }}"
          ARCH="${{ matrix.goarch }}"
          EXT="${{ matrix.ext }}"
          ARTIFACT="upcloud-app-platform_${VERSION}_${OS}_${ARCH}"
          mkdir -p release
          if [ "$OS" = "windows" ]; then
            cd dist
            zip "../release/${ARTIFACT}.zip" upcloud-app-platform.exe
          else
            tar -C dist -czf "release/${ARTIFACT}.tar.gz" upcloud-app-platform
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find release-artifacts -type f -maxdepth 3 -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
